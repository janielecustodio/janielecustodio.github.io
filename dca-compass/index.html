<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DCA Compass — Janiele Custodio</title>
<meta name="description" content="DCA Compass — a dollar-cost averaging portfolio simulator. Backtest multi-asset DCA strategies with real price data, FX conversion, and portfolio analytics.">
<link rel="canonical" href="https://janielecustodio.com/dca-compass/">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script>document.documentElement.setAttribute('data-theme',localStorage.getItem('jc_theme')||'dark')</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#111318;--ink2:#16191f;--ink3:#1c2029;
  --line:#22273a;--line2:#2c3248;
  --muted:#505775;--muted2:#7a8299;
  --body:#b2bace;--head:#e2e6f2;
  --accent:#8c9eff;--r:5px;
}
[data-theme="light"]{
  --ink:#f7f8fc;--ink2:#eef0f7;--ink3:#e6e8f2;
  --line:#d8dce8;--line2:#c4c9da;
  --muted:#9299b0;--muted2:#626882;
  --body:#474e68;--head:#1a1d2e;
  --accent:#4a5cf0;
}
html,body{height:100%;overflow:hidden}
body{
  background:var(--ink);color:var(--body);
  font-family:'IBM Plex Sans',sans-serif;
  display:flex;-webkit-font-smoothing:antialiased;
}

/* ── SIDEBAR ── */
.sidebar{
  width:210px;min-width:210px;
  background:var(--ink2);border-right:1px solid var(--line);
  display:flex;flex-direction:column;
  height:100vh;padding:28px 0 0;
  flex-shrink:0;overflow-y:auto;
  transition:transform .25s ease;
  z-index:100;
}
.sidebar-brand{padding:0 22px 22px;border-bottom:1px solid var(--line);margin-bottom:16px}
.sidebar-brand-name{font-size:15px;font-weight:600;color:var(--head);letter-spacing:.01em;line-height:1.3}
.sidebar-brand-sub{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);margin-top:3px;letter-spacing:.05em}

.nav-section{padding:0 14px;margin-bottom:4px}
.nav-section-label{
  font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:500;
  text-transform:uppercase;letter-spacing:.14em;color:var(--muted);
  padding:0 8px;margin-bottom:3px;
  display:flex;align-items:center;gap:6px;
}
.nav-section-label::after{content:'';flex:1;height:1px;background:var(--line)}
.nav-link{
  display:flex;align-items:center;gap:9px;
  padding:6px 10px;border-radius:var(--r);
  color:var(--muted2);text-decoration:none;
  font-size:13px;font-weight:400;
  transition:background .15s,color .15s;
}
.nav-link:hover{background:var(--ink3);color:var(--body);text-decoration:none}
.nav-link.active{background:rgba(140,158,255,.1);color:var(--accent);font-weight:500}
.nav-link.sub{padding-left:26px;font-size:12px}
.nav-icon{font-size:13px;width:16px;text-align:center;flex-shrink:0}
.nav-group-children{display:block}
.chevron{margin-left:auto;font-size:10px;opacity:.5;transform:rotate(90deg)}

/* sidebar footer */
.sidebar-footer{
  margin-top:auto;padding:16px 22px;
  border-top:1px solid var(--line);
}
.theme-toggle{
  display:flex;align-items:center;gap:8px;
  background:none;border:1px solid var(--line2);
  border-radius:var(--r);padding:5px 10px;
  color:var(--muted2);font-size:11px;cursor:pointer;
  font-family:'IBM Plex Mono',monospace;
  transition:color .15s,border-color .15s;
  width:100%;
}
.theme-toggle:hover{color:var(--body);border-color:var(--muted)}

/* ── RIGHT SIDE: topbar + iframe ── */
.content{display:flex;flex-direction:column;flex:1;height:100vh;overflow:hidden}

.topbar{
  background:var(--ink2);border-bottom:1px solid var(--line);
  padding:9px 20px;
  display:flex;align-items:center;gap:14px;
  flex-shrink:0;
}
.btn-back{
  background:transparent;border:1px solid var(--line2);border-radius:var(--r);
  color:var(--muted2);font-size:11px;padding:4px 11px;cursor:pointer;
  font-family:'IBM Plex Mono',monospace;text-decoration:none;
  transition:color .15s,border-color .15s;
}
.btn-back:hover{color:var(--head);border-color:var(--muted);text-decoration:none}
.topbar-title{font-size:13px;color:var(--body);font-weight:500}
.topbar-ext{
  margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:11px;
  color:var(--muted);text-decoration:none;transition:color .15s;
}
.topbar-ext:hover{color:var(--accent)}

iframe{flex:1;border:none;width:100%;display:block}

/* ── MOBILE ── */
.mobile-menu-btn{
  display:none;position:fixed;top:14px;left:14px;z-index:200;
  background:var(--ink2);border:1px solid var(--line2);border-radius:var(--r);
  width:36px;height:36px;align-items:center;justify-content:center;
  cursor:pointer;font-size:18px;color:var(--body);
}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99}
.sidebar-overlay.active{display:block}

@media(max-width:900px){
  .sidebar{position:fixed;top:0;left:0;height:100vh;transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .mobile-menu-btn{display:flex}
}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--ink)}
::-webkit-scrollbar-thumb{background:var(--line2);border-radius:2px}
</style>
</head>
<body>

<button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Open menu">☰</button>
<div class="sidebar-overlay" id="sidebar-overlay"></div>

<!-- SIDEBAR -->
<nav class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <div class="sidebar-brand-name">Janiele Custodio</div>
    <div class="sidebar-brand-sub">PhD · Quant Finance</div>
  </div>

  <div class="nav-section">
    <div class="nav-section-label">Menu</div>
    <a class="nav-link" href="/">
      <span class="nav-icon">⌂</span> Home
    </a>
  </div>

  <div class="nav-section">
    <div class="nav-section-label">Vibing</div>
    <div class="nav-group">
      <a class="nav-link" href="/vibing/">
        <span class="nav-icon">⚡</span> Vibe Coding
        <span class="chevron">›</span>
      </a>
      <div class="nav-group-children">
        <a class="nav-link sub active" href="/dca-compass/">
          <span class="nav-icon">🧭</span> DCA Compass
        </a>
      </div>
    </div>
  </div>

  <div class="sidebar-footer">
    <button class="theme-toggle" id="theme-toggle">
      <span id="theme-icon">☀</span>&nbsp;<span id="theme-label">Light mode</span>
    </button>
  </div>
</nav>

<!-- CONTENT -->
<div class="content">
  <div class="topbar">
    <a class="btn-back" href="/vibing/">‹ Back</a>
    <span class="topbar-title">🧭 DCA Compass</span>
    <a class="topbar-ext" href="https://janielecustodio.github.io/dca-compass/" target="_blank">↗ open standalone</a>
  </div>
  <iframe
    src="https://janielecustodio.github.io/dca-compass/"
    title="DCA Compass — Portfolio Simulator"
    allow="same-origin"
  ></iframe>
</div>

<script>
// Mobile sidebar toggle
const sidebar  = document.getElementById('sidebar');
const overlay  = document.getElementById('sidebar-overlay');
const menuBtn  = document.getElementById('mobile-menu-btn');
menuBtn.addEventListener('click', () => { sidebar.classList.add('open'); overlay.classList.add('active'); });
overlay.addEventListener('click', () => { sidebar.classList.remove('open'); overlay.classList.remove('active'); });
// Theme toggle
(function(){
  const root = document.documentElement;
  const icon = document.getElementById('theme-icon');
  const lbl  = document.getElementById('theme-label');
  function apply(t){
    root.setAttribute('data-theme', t);
    localStorage.setItem('jc_theme', t);
    icon.textContent = t === 'dark' ? '☀' : '☾';
    lbl.textContent  = t === 'dark' ? 'Light mode' : 'Dark mode';
  }
  apply(localStorage.getItem('jc_theme') || 'dark');
  document.getElementById('theme-toggle').addEventListener('click', () =>
    apply(root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark')
  );
})();
</script>
</body>
</html>
